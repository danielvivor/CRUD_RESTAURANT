{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create an Account | Nala Restaurant</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body style="padding: 2rem; max-width: 400px; margin: 0 auto; font-family: sans-serif;">
    <h2>Create an Account</h2>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.5rem; background-color: #d4af37; border: none; cursor: pointer;">SIGN UP</button>
    </form>
    
    <p style="margin-top: 1.5rem;"><a href="{% url 'login' %}">Already have an account? Log in here.</a></p>
    <p><a href="{% url 'home' %}">Back to Homepage</a></p>
</body>
</html>
